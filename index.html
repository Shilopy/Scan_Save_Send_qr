<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR Сканер ЧЗ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>QR Сканер ЧЗ</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js">
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#5b9cf6;--purple:#a78bfa;--green:#4ade80;--red:#f87171;--orange:#fb923c;
  --bg:#0a0a0a;--card:#1c1c1e;--border:#2c2c2e;--text:#f0f0f0;--sub:#888;
  --cat-light:#f59e0b;--cat-build:#3b82f6;
}
[data-theme="light"]{
  --bg:#f5f3ef;--card:#fff;--border:#e2dfd8;--text:#1a1917;--sub:#6b6860;
  --blue:#1a4db8;--purple:#7c3aed;--green:#15803d;--red:#dc2626;--orange:#ea580c;
  --cat-light:#d97706;--cat-build:#2563eb;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;transition:background .25s,color .25s;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom)}

/* top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 0;max-width:480px;margin:0 auto}
.top-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s;-webkit-tap-highlight-color:transparent}
.top-btn:active{opacity:.7}

/* header */
.header{padding:10px 14px 6px;text-align:center}
.header h1{font-size:16px;font-weight:700}
.header p{font-size:11px;color:var(--sub);margin-top:2px}

/* category selector */
.cat-selector{display:flex;gap:8px;padding:0 14px 8px;max-width:480px;margin:0 auto}
.cat-btn{flex:1;padding:10px 6px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;gap:3px}
.cat-btn .cat-icon{font-size:22px;line-height:1}
.cat-btn .cat-label{font-size:11px}
.cat-btn.active-light{border-color:var(--cat-light);color:var(--cat-light);background:rgba(245,158,11,.1)}
.cat-btn.active-build{border-color:var(--cat-build);color:var(--cat-build);background:rgba(59,130,246,.1)}
.cat-btn:active{opacity:.7}

/* camera */
#camera-wrap{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:0;transition:all .3s}
#camera-wrap.hidden{display:none}
#reader{width:100%;border-radius:14px;overflow:hidden;background:#000;border:1px solid var(--border);height:min(90vw,420px);max-height:420px;position:relative}
#reader video{width:100%!important;height:100%!important;object-fit:cover!important;position:absolute!important;top:0!important;left:0!important}
#reader>div:first-of-type{width:100%!important;height:100%!important;position:absolute!important;top:0!important;left:0!important}
#stop-btn{display:none;width:100%;padding:8px;border-radius:0 0 14px 14px;border:1px solid var(--border);border-top:none;background:var(--card);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
#stop-btn.show{display:block}
#reader__dashboard_section_swaplink,#reader__status_span,#reader__header_message{display:none!important}
#reader img{display:none}
#reader select{background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:12px;margin:4px auto;display:block}

/* scan controls */
#scan-controls{display:none;padding:6px 10px 2px;flex-direction:column;gap:5px}
#scan-controls.show{display:flex}
.zoom-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px}
.zoom-bar .zoom-icon{font-size:13px}
.zoom-bar input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:var(--border);accent-color:var(--blue);outline:none;cursor:pointer}
.zoom-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 0 3px rgba(91,156,246,.25)}
.zoom-bar .zoom-val{font-size:11px;font-weight:700;color:var(--blue);min-width:30px;text-align:right}
.cam-row{display:flex;gap:5px}
#torch-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
#torch-btn.on{background:rgba(251,191,36,.15);border-color:#fbbf24;color:#fbbf24}
.zoom-presets{display:flex;gap:4px}
.zoom-preset{padding:8px 8px;border-radius:8px;background:var(--card);border:1.5px solid var(--border);color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;min-width:36px;text-align:center}
.zoom-preset.active{border-color:var(--blue);color:var(--blue);background:rgba(91,156,246,.1)}
#zoom-unavail{display:none;text-align:center;font-size:10px;color:var(--sub);padding:3px 0}

/* bottom */
.bottom{padding:8px 14px 20px;display:flex;flex-direction:column;gap:8px;max-width:480px;margin:0 auto}
#status{text-align:center;font-size:12px;color:var(--sub);min-height:16px;transition:color .2s}
#status.ok{color:var(--green)}
#status.err{color:var(--red)}
#status.loading{color:var(--orange)}

.btn-start{background:var(--blue);color:#fff;width:100%;padding:12px;font-size:14px;border-radius:12px;border:none;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-start:active{opacity:.7}

/* scanned codes list */
#codes-section{max-width:480px;margin:0 auto;padding:0 14px 10px}
#codes-section.hidden{display:none}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:6px 0 8px}
.section-header h2{font-size:14px;font-weight:700}
.section-header .count-badge{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;min-width:24px;text-align:center}
#codes-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;padding-right:4px}
#codes-list::-webkit-scrollbar{width:4px}
#codes-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.code-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.code-item .code-num{font-size:10px;font-weight:700;color:var(--sub);min-width:22px;text-align:right}
.code-item .code-text{font-size:12px;font-weight:600;font-family:monospace;letter-spacing:.5px;flex:1;word-break:break-all;line-height:1.3}
.code-item .code-cat{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:600;white-space:nowrap}
.code-item .code-cat.light{background:rgba(245,158,11,.15);color:var(--cat-light)}
.code-item .code-cat.build{background:rgba(59,130,246,.15);color:var(--cat-build)}
.code-item .code-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:2px;line-height:1;opacity:.6;transition:opacity .2s}
.code-item .code-del:hover{opacity:1}

/* action buttons */
.action-row{display:flex;gap:6px;flex-wrap:wrap;max-width:480px;margin:0 auto;padding:0 14px 8px}
.action-btn{flex:1;min-width:calc(50% - 3px);padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:5px}
.action-btn:active{opacity:.7}
.action-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.action-btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.action-btn.danger{color:var(--red);border-color:var(--red)}
.action-btn:disabled{opacity:.4;pointer-events:none}

/* options row */
.options-row{display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto;padding:0 14px 6px;font-size:12px;color:var(--sub)}
.options-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.options-row input[type=checkbox]{accent-color:var(--blue);width:16px;height:16px;cursor:pointer}

/* toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}

/* history modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:70vh;overflow-y:auto;padding:16px 18px 24px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h3{font-size:15px;font-weight:700;margin-bottom:12px;text-align:center}
.modal-close{display:block;width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;text-align:center}
.history-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.history-item:last-child{border-bottom:none}
.history-item .hi-date{font-size:11px;color:var(--sub)}
.history-item .hi-count{font-size:12px;font-weight:700}
.history-item .hi-cat{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.history-item .hi-cat.light{background:rgba(245,158,11,.15);color:var(--cat-light)}
.history-item .hi-cat.build{background:rgba(59,130,246,.15);color:var(--cat-build)}
.history-item .hi-restore{font-size:11px;color:var(--blue);cursor:pointer;font-weight:600;background:none;border:none;padding:4px 8px}
.history-empty{text-align:center;padding:24px;color:var(--sub);font-size:13px}

/* responsive */
@media(min-width:480px){
  #reader{height:420px}
  .bottom,.action-row,.options-row,#codes-section,.top-bar,.cat-selector{padding-left:0;padding-right:0}
}
</style>
</head>
<body>

<div class="top-bar">
  <button class="top-btn" onclick="showHistory()">📋 История</button>
  <a class="top-btn" href="guide.html">📋 Инструкция</a>
  <button class="top-btn" onclick="toggleTheme()" id="theme-btn">
    <span id="theme-icon">☀️</span>
    <span id="theme-label">Светлая</span>
  </button>
</div>

<div class="header">
  <h1>📷 QR Сканер ЧЗ</h1>
  <p>Сканирование кодов Честного знака</p>
</div>

<!-- Category selector -->
<div class="cat-selector">
  <button class="cat-btn active-light" id="cat-light" onclick="setCategory('light')">
    <span class="cat-icon">👕</span>
    <span class="cat-label">Лёгкая промышленность</span>
  </button>
  <button class="cat-btn" id="cat-build" onclick="setCategory('build')">
    <span class="cat-icon">🏗️</span>
    <span class="cat-label">Строительные материалы</span>
  </button>
</div>

<!-- Camera -->
<div id="camera-wrap" class="hidden">
  <div id="reader"></div>
  <button id="stop-btn" onclick="stopCamera()">✕ Закрыть камеру</button>
  <div id="scan-controls">
    <div class="zoom-bar" id="zoom-bar" style="display:none">
      <span class="zoom-icon">🔍</span>
      <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" oninput="applyZoom(this.value)">
      <span class="zoom-val" id="zoom-val">1×</span>
    </div>
    <div class="cam-row" id="cam-row" style="display:none">
      <button id="torch-btn" onclick="toggleTorch()">🔦 Фонарик</button>
      <div class="zoom-presets" id="zoom-presets" style="display:none">
        <button class="zoom-preset active" onclick="setZoomPreset(1)">1×</button>
        <button class="zoom-preset" onclick="setZoomPreset(2)">2×</button>
        <button class="zoom-preset" onclick="setZoomPreset(3)">3×</button>
      </div>
    </div>
    <div id="zoom-unavail">Зум недоступен на этом устройстве</div>
  </div>
</div>

<div class="bottom">
  <div id="status">Нажмите кнопку для запуска камеры</div>
  <button class="btn-start" id="start-btn" onclick="startScanner()">📷 Запустить камеру</button>
</div>

<!-- Scanned codes -->
<div id="codes-section" class="hidden">
  <div class="section-header">
    <h2>📋 Отсканированные коды</h2>
    <span class="count-badge" id="count-badge">0</span>
  </div>
  <div id="codes-list"></div>
</div>

<!-- Action buttons -->
<div class="action-row" id="action-row" style="display:none">
  <button class="action-btn primary" id="saveBtn" onclick="saveTxt()">💾 Сохранить .txt</button>
  <button class="action-btn" id="copyBtn" onclick="copyAll()">📋 Копировать</button>
  <button class="action-btn green" id="shareBtn" onclick="shareAll()">📤 Поделиться</button>
  <button class="action-btn danger" id="clearBtn" onclick="clearAll()">🗑 Очистить</button>
</div>

<div class="options-row" id="options-row" style="display:none">
  <label><input type="checkbox" id="autoClearCheck"> 🧹 Очистить после отправки</label>
  <label><input type="checkbox" id="soundCheck" checked> 🔊 Звук</label>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- History modal -->
<div class="modal-overlay" id="history-modal">
  <div class="modal-sheet">
    <h3>📋 История сканирований</h3>
    <div id="history-list"></div>
    <button class="modal-close" onclick="closeHistory()">Закрыть</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Scan_Save_Send_qr — PWA сканер QR/DataMatrix Честного знака
//  Версия: 1.0
// ═══════════════════════════════════════════════════════════════

// ── State ──────────────────────────────────────────────────────
let scanner      = null;
let scanActive   = false;
let currentCategory = 'light'; // 'light' | 'build'
let torchOn      = false;
let zoomSupported = false;
let currentZoom  = 1;

let codes = [];        // [{text, category, timestamp}]
let sessionId = Date.now();

// DOM refs
const statusEl   = document.getElementById('status');
const startBtn   = document.getElementById('start-btn');
const codesList  = document.getElementById('codes-list');
const countBadge = document.getElementById('count-badge');
const codesSection = document.getElementById('codes-section');
const actionRow  = document.getElementById('action-row');
const optionsRow = document.getElementById('options-row');

// ── XSS защита ────────────────────────────────────────────────
function esc(str) {
  if (!str && str !== 0) return '';
  return String(str).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,'&#x27;');
}

// ── Theme ──────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const newTheme = isLight ? 'dark' : 'light';
  document.documentElement.dataset.theme = newTheme;
  localStorage.setItem('ssq-theme', newTheme);
  updateThemeBtn(newTheme);
}
function updateThemeBtn(theme) {
  document.getElementById('theme-icon').textContent  = theme === 'light' ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = theme === 'light' ? 'Тёмная' : 'Светлая';
}
(function() {
  const saved = localStorage.getItem('ssq-theme');
  const sys   = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  const theme = saved || sys;
  document.documentElement.dataset.theme = theme;
  updateThemeBtn(theme);
})();

// ── Category ───────────────────────────────────────────────────
function setCategory(cat) {
  currentCategory = cat;
  document.getElementById('cat-light').className = 'cat-btn' + (cat === 'light' ? ' active-light' : '');
  document.getElementById('cat-build').className = 'cat-btn' + (cat === 'build' ? ' active-build' : '');
  localStorage.setItem('ssq-category', cat);
}
(function() {
  const saved = localStorage.getItem('ssq-category');
  if (saved) setCategory(saved);
})();

// ── Toast ──────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

// ── Sound (Web Audio beep) ────────────────────────────────────
let audioCtx = null;
function playBeep() {
  if (!document.getElementById('soundCheck').checked) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 1200;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
  } catch(e) { /* silent fail */ }
}

// ── LocalStorage persistence ──────────────────────────────────
function saveToLocalStorage() {
  try {
    localStorage.setItem('ssq-codes', JSON.stringify(codes));
    localStorage.setItem('ssq-category', currentCategory);
  } catch(e) { /* storage full — ignore */ }
}

function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem('ssq-codes');
    if (saved) {
      codes = JSON.parse(saved);
      if (!Array.isArray(codes)) codes = [];
    }
  } catch(e) { codes = []; }
}

// ── History ────────────────────────────────────────────────────
function saveSessionToHistory() {
  if (codes.length === 0) return;
  try {
    const history = JSON.parse(localStorage.getItem('ssq-history') || '[]');
    history.push({
      id: sessionId,
      date: new Date().toISOString(),
      category: currentCategory,
      count: codes.length,
      codes: codes.slice()
    });
    // keep last 50 sessions
    if (history.length > 50) history.splice(0, history.length - 50);
    localStorage.setItem('ssq-history', JSON.stringify(history));
  } catch(e) { /* ignore */ }
}

function showHistory() {
  const modal = document.getElementById('history-modal');
  const list  = document.getElementById('history-list');
  try {
    const history = JSON.parse(localStorage.getItem('ssq-history') || '[]');
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">История пуста</div>';
    } else {
      list.innerHTML = history.slice().reverse().map((h, i) => {
        const idx = history.length - 1 - i;
        const d = new Date(h.date);
        const dateStr = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
        const catLabel = h.category === 'light' ? '👕 Лёгкая пром.' : '🏗️ Строит. мат.';
        const catClass = h.category === 'light' ? 'light' : 'build';
        return `<div class="history-item">
          <div>
            <div class="hi-date">${esc(dateStr)}</div>
            <div><span class="hi-cat ${catClass}">${catLabel}</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="hi-count">${h.count} шт</span>
            <button class="hi-restore" onclick="restoreHistory(${idx})">↩ Восстановить</button>
          </div>
        </div>`;
      }).join('');
    }
  } catch(e) {
    list.innerHTML = '<div class="history-empty">Ошибка загрузки истории</div>';
  }
  modal.classList.add('show');
}

function closeHistory() {
  document.getElementById('history-modal').classList.remove('show');
}

function restoreHistory(idx) {
  try {
    const history = JSON.parse(localStorage.getItem('ssq-history') || '[]');
    const session = history[idx];
    if (!session) return;
    codes = session.codes.slice();
    currentCategory = session.category;
    setCategory(currentCategory);
    saveToLocalStorage();
    renderCodes();
    closeHistory();
    showToast('✅ История восстановлена (' + codes.length + ' кодов)', 'success');
  } catch(e) { showToast('Ошибка восстановления', 'error'); }
}

// ── Render codes list ─────────────────────────────────────────
function renderCodes() {
  const hasCodes = codes.length > 0;
  codesSection.classList.toggle('hidden', !hasCodes);
  actionRow.style.display = hasCodes ? 'flex' : 'none';
  optionsRow.style.display = hasCodes ? 'flex' : 'none';
  countBadge.textContent = codes.length;

  if (!hasCodes) {
    codesList.innerHTML = '';
    return;
  }

  codesList.innerHTML = codes.map((c, i) => {
    const catClass = c.category === 'light' ? 'light' : 'build';
    const catLabel = c.category === 'light' ? '👕' : '🏗️';
    return `<div class="code-item">
      <span class="code-num">#${i + 1}</span>
      <span class="code-text">${esc(c.text)}</span>
      <span class="code-cat ${catClass}">${catLabel}</span>
      <button class="code-del" onclick="removeCode(${i})" title="Удалить">✕</button>
    </div>`;
  }).join('');

  // auto-scroll to bottom
  codesList.scrollTop = codesList.scrollHeight;
}

// ── Add code ──────────────────────────────────────────────────
function addCode(raw) {
  // Берём первые 31 символ
  let short = raw.substring(0, 31);

  // Если строка короче 31 — берём всю
  if (short.length < 1) return false;

  // Защита от дублей
  if (codes.some(c => c.text === short)) {
    showToast('⚠️ Этот код уже отсканирован', 'error');
    return false;
  }

  codes.push({
    text: short,
    category: currentCategory,
    timestamp: Date.now()
  });

  // Вибрация
  try { navigator.vibrate(100); } catch(_) {}

  // Звук
  playBeep();

  // Автосохранение
  saveToLocalStorage();

  renderCodes();
  showToast('✅ Код добавлен (' + short.length + ' символов)', 'success');
  return true;
}

// ── Remove single code ────────────────────────────────────────
function removeCode(idx) {
  codes.splice(idx, 1);
  saveToLocalStorage();
  renderCodes();
}

// ── Clear all ─────────────────────────────────────────────────
function clearAll() {
  if (codes.length === 0) return;
  if (!confirm('Очистить все отсканированные коды?')) return;
  codes = [];
  saveToLocalStorage();
  renderCodes();
  showToast('🗑 Список очищен', '');
}

// ── Save .txt ─────────────────────────────────────────────────
function saveTxt() {
  if (codes.length === 0) { showToast('Нет кодов для сохранения', 'error'); return; }

  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + '_' +
    String(now.getHours()).padStart(2,'0') + '-' +
    String(now.getMinutes()).padStart(2,'0');

  const catLabel = currentCategory === 'light' ? 'Лёгкая промышленность' : 'Строительные материалы';
  const header = 'QR коды Честного знака\nКатегория: ' + catLabel + '\nДата: ' + now.toLocaleString('ru-RU') + '\nВсего: ' + codes.length + ' шт\n' + '─'.repeat(36) + '\n\n';
  const body = codes.map(c => c.text).join('\n');
  const content = header + body;

  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'QR_коды_' + dateStr + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('💾 Файл сохранён', 'success');

  if (document.getElementById('autoClearCheck').checked) {
    setTimeout(() => { clearAll(); }, 300);
  }
}

// ── Copy all ──────────────────────────────────────────────────
function copyAll() {
  if (codes.length === 0) { showToast('Нет кодов для копирования', 'error'); return; }
  const text = codes.map(c => c.text).join('\n');
  try {
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 Скопировано ' + codes.length + ' кодов', 'success');
      if (document.getElementById('autoClearCheck').checked) {
        setTimeout(() => { clearAll(); }, 300);
      }
    }).catch(() => fallbackCopy(text));
  } catch(_) { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('📋 Скопировано', 'success'); } catch(_) { showToast('Ошибка копирования', 'error'); }
  document.body.removeChild(ta);
}

// ── Share ─────────────────────────────────────────────────────
function shareAll() {
  if (codes.length === 0) { showToast('Нет кодов для отправки', 'error'); return; }
  const text = codes.map(c => c.text).join('\n');

  // Try native Share API first
  if (navigator.share) {
    const now = new Date();
    const dateStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + '_' +
      String(now.getHours()).padStart(2,'0') + '-' +
      String(now.getMinutes()).padStart(2,'0');
    const catLabel = currentCategory === 'light' ? 'Лёгкая промышленность' : 'Строительные материалы';
    const header = 'QR коды ЧЗ (' + catLabel + '):\n';
    const blob = new Blob([header + text], { type: 'text/plain;charset=utf-8' });
    const file = new File([blob], 'QR_коды_' + dateStr + '.txt', { type: 'text/plain' });

    navigator.share({
      title: 'QR коды Честного знака',
      text: header + text,
      files: [file]
    }).then(() => {
      if (document.getElementById('autoClearCheck').checked) {
        setTimeout(() => { clearAll(); }, 500);
      }
    }).catch(() => {
      // fallback to clipboard
      copyAll();
    });
  } else {
    // Fallback: copy to clipboard
    copyAll();
  }
}

// ── Camera / Scanner ──────────────────────────────────────────
function getVideoTrack() {
  try {
    const video = document.querySelector('#reader video');
    if (!video || !video.srcObject) return null;
    const tracks = video.srcObject.getVideoTracks();
    return tracks.length ? tracks[0] : null;
  } catch(_) { return null; }
}

function applyZoom(val) {
  val = parseFloat(val);
  currentZoom = val;
  document.getElementById('zoom-val').textContent = val.toFixed(1) + '×';
  document.querySelectorAll('.zoom-preset').forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.textContent) === Math.round(val));
  });
  const track = getVideoTrack();
  if (!track) return;
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) {
      const zMin = caps.zoom.min || 1;
      const zMax = caps.zoom.max || 8;
      const zVal = Math.min(Math.max(val, zMin), zMax);
      track.applyConstraints({ advanced: [{ zoom: zVal }] }).catch(() => {});
    }
  } catch(_) {}
}

function setZoomPreset(val) {
  document.getElementById('zoom-slider').value = val;
  applyZoom(val);
}

async function toggleTorch() {
  const track = getVideoTrack();
  if (!track) return;
  try {
    torchOn = !torchOn;
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    const btn = document.getElementById('torch-btn');
    btn.textContent = torchOn ? '🔦 Вкл' : '🔦 Фонарик';
    btn.classList.toggle('on', torchOn);
  } catch(e) {
    torchOn = false;
  }
}

function probeCapabilities() {
  setTimeout(() => {
    const track = getVideoTrack();
    document.getElementById('scan-controls').classList.add('show');
    document.getElementById('cam-row').style.display = 'flex';
    if (!track) {
      document.getElementById('zoom-unavail').style.display = 'block';
      return;
    }
    try {
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.zoom) {
        zoomSupported = true;
        const slider = document.getElementById('zoom-slider');
        const zMin   = caps.zoom.min || 1;
        const zMax   = Math.min(caps.zoom.max || 5, 8);
        slider.min   = zMin;
        slider.max   = zMax;
        slider.step  = caps.zoom.step || 0.1;
        slider.value = currentZoom;
        document.getElementById('zoom-bar').style.display = 'flex';
        const presets = document.querySelectorAll('.zoom-preset');
        let anyVisible = false;
        presets.forEach(btn => {
          const v = parseFloat(btn.textContent);
          if (v <= zMax) { btn.style.display = ''; anyVisible = true; }
          else btn.style.display = 'none';
        });
        if (anyVisible) document.getElementById('zoom-presets').style.display = 'flex';
      } else {
        document.getElementById('zoom-unavail').style.display = 'block';
      }
      if (caps.torch) {
        torchSupported = true;
      } else {
        document.getElementById('torch-btn').style.display = 'none';
      }
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
      }
    } catch(e) {
      document.getElementById('zoom-unavail').style.display = 'block';
    }
  }, 900);
}

async function stopCamera() {
  if (scanner) {
    scanActive = false;
    try { await scanner.stop(); } catch(_) {}
    scanner = null;
  }
  if (torchOn) torchOn = false;
  document.getElementById('camera-wrap').classList.add('hidden');
  document.getElementById('stop-btn').classList.remove('show');
  document.getElementById('scan-controls').classList.remove('show');
  setStatus('');
  startBtn.style.display = 'block';
}

async function startScanner() {
  startBtn.style.display = 'none';
  document.getElementById('camera-wrap').classList.remove('hidden');
  document.getElementById('stop-btn').classList.add('show');
  torchOn = false;
  zoomSupported = false;
  currentZoom = 1;

  const scanControls = document.getElementById('scan-controls');
  scanControls.classList.remove('show');
  document.getElementById('zoom-bar').style.display    = 'none';
  document.getElementById('cam-row').style.display     = 'none';
  document.getElementById('zoom-presets').style.display = 'none';
  document.getElementById('zoom-unavail').style.display = 'none';
  document.getElementById('zoom-slider').value = 1;
  document.getElementById('zoom-val').textContent = '1×';
  const torchBtn = document.getElementById('torch-btn');
  torchBtn.textContent = '🔦 Фонарик';
  torchBtn.classList.remove('on');
  torchBtn.style.display = '';
  document.querySelectorAll('.zoom-preset').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });

  setStatus('Запрашиваю доступ к камере…');

  const formats = [
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.CODE_39,
  ];

  const videoConstraints = {
    facingMode: { ideal: 'environment' },
    width:      { ideal: 3840 },
    height:     { ideal: 2160 },
    frameRate:  { ideal: 30 },
  };

  const qrbox = { width: 220, height: 220 };

  const scanConfig = {
    fps: 30,
    qrbox: qrbox,
    aspectRatio: 1.0,
    formatsToSupport: formats,
    disableFlip: false,
  };

  async function tryStart(constraints) {
    scanner = new Html5Qrcode('reader', {
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      verbose: false,
    });
    await scanner.start(constraints, scanConfig, onScanSuccess, () => {});
  }

  try {
    await tryStart(videoConstraints);
  } catch(e1) {
    try {
      if (scanner) { try { await scanner.stop(); } catch(_) {} scanner = null; }
      await tryStart({ facingMode: 'environment' });
    } catch(e2) {
      try {
        if (scanner) { try { await scanner.stop(); } catch(_) {} scanner = null; }
        await tryStart(true);
      } catch(e3) {
        startBtn.style.display = 'block';
        if (/NotAllowed|Permission/i.test(e3.toString()))
          setStatus('⛔ Доступ к камере запрещён. Разрешите в настройках браузера.', 'err');
        else if (/NotFound/i.test(e3.toString()))
          setStatus('📵 Камера не найдена.', 'err');
        else
          setStatus('❌ Не удалось запустить камеру: ' + e3.message, 'err');
        return;
      }
    }
  }

  scanActive = true;
  probeCapabilities();
  setStatus('Наведите камеру на QR-код или DataMatrix…');
}

let lastScan = 0;
function onScanSuccess(raw) {
  if (!scanActive) return;
  const now = Date.now();
  if (now - lastScan < 1200) return;
  lastScan = now;
  scanActive = false;
  scanner.stop().catch(() => {});

  document.getElementById('camera-wrap').classList.add('hidden');
  document.getElementById('stop-btn').classList.remove('show');

  // Добавляем код в список
  addCode(raw);

  // Автоматически перезапускаем сканер через 1.5 сек
  setTimeout(() => {
    if (codes.length > 0) {
      startScanner();
    }
  }, 1500);
}

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = cls || '';
}

// ── Init ───────────────────────────────────────────────────────
loadFromLocalStorage();
renderCodes();

// Если есть коды при загрузке — сохраняем сессию
if (codes.length > 0) {
  saveSessionToHistory();
}

// Сохраняем сессию при закрытии/перезагрузке
window.addEventListener('beforeunload', () => {
  saveSessionToHistory();
});

// ── Service Worker Registration ───────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      console.log('SW registered:', reg.scope);
    }).catch((err) => {
      console.log('SW registration failed:', err);
    });
  });
}
</script>
